services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: learnmap
      POSTGRES_PASSWORD: learnmap_dev_password
      POSTGRES_DB: learnmap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnmap"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
